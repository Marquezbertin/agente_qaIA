[pytest]
# Configuracao do pytest para o projeto de testes exemplo
# Aprenda mais: https://docs.pytest.org/en/stable/reference/customize.html

# Diretorio raiz dos testes
testpaths = tests

# Markers personalizados (categorias de teste)
markers =
    smoke: Testes rapidos de sanidade
    regression: Testes de regressao completos
    security: Testes de seguranca
    api: Testes de API
    e2e: Testes end-to-end (ponta a ponta)
    slow: Testes que demoram mais de 30s

# Formato de saida
addopts = -v --tb=short

# Padrao de descoberta de testes
python_files = test_*.py
python_classes = Test*
python_functions = test_*
